<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="purpleGlow" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.2"/>
      <stop offset="82%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="roseGlow" cx="50%" cy="100%" r="48%">
      <stop offset="0%" stop-color="#e85d75" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#e85d75" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="72" height="72" patternUnits="userSpaceOnUse" patternTransform="translate(8 8)">
      <circle cx="0" cy="0" r="5" fill="#7c6af7" opacity="0.16"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#090910"/>
  <rect width="1024" height="1024" fill="url(#purpleGlow)"/>
  <rect width="1024" height="1024" fill="url(#roseGlow)"/>
  <rect width="1024" height="1024" fill="url(#dots)" opacity="0.38"/>
  <g filter="url(#softShadow)" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="148" font-weight="900" letter-spacing="-4">
    <text x="512" y="543" text-anchor="middle" fill="#f0f0fa">mixdro<tspan fill="#ffffff">.</tspan></text>
  </g>
</svg>
