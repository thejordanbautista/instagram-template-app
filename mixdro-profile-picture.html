<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1024, initial-scale=1" />
  <title>MixDro Profile Picture</title>
  <style>
    html,
    body {
      width: 1024px;
      height: 1024px;
      margin: 0;
      overflow: hidden;
      background: #090910;
    }

    .avatar {
      position: relative;
      display: grid;
      place-items: center;
      width: 1024px;
      height: 1024px;
      background:
        radial-gradient(circle at 50% 42%, rgba(124, 106, 247, 0.2), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(232, 93, 117, 0.1), transparent 42%),
        #090910;
    }

    .avatar::before {
      position: absolute;
      inset: 0;
      content: "";
      background-image: radial-gradient(circle, rgba(124, 106, 247, 0.16) 0 5px, transparent 6px);
      background-size: 72px 72px;
      opacity: 0.38;
      transform: translate(8px, 8px);
    }

    .logo {
      position: relative;
      color: #f0f0fa;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 148px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
      filter: drop-shadow(0 14px 36px rgba(0, 0, 0, 0.46));
      text-rendering: geometricPrecision;
    }

    .dot {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main class="avatar">
    <div class="logo">mixdro<span class="dot">.</span></div>
  </main>
</body>
</html>
